<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeSignals — Payment Successful</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4a;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 24px; color: #fff; }
        .header h1 span { color: #00d4aa; }
        .header a { color: #00d4aa; text-decoration: none; margin-left: 20px; }

        .container { max-width: 600px; margin: 0 auto; padding: 80px 20px; text-align: center; }

        .success-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0, 212, 170, 0.15); border: 2px solid #00d4aa;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 36px;
        }

        .container h2 { font-size: 32px; margin-bottom: 12px; }
        .container .subtitle { color: #888; font-size: 16px; margin-bottom: 40px; }

        .detail-box {
            background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px;
            padding: 24px; text-align: left; margin-bottom: 24px;
        }
        .detail-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid #1a1a2a;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #888; font-size: 14px; }
        .detail-value { font-size: 14px; font-weight: 600; }

        .api-key-box {
            background: #0a1a15; border: 1px solid #00d4aa; border-radius: 8px;
            padding: 16px; margin-top: 12px; word-break: break-all;
            font-family: 'SF Mono', SFMono-Regular, monospace; font-size: 14px;
            color: #00d4aa;
        }
        .api-key-warning { color: #f0a500; font-size: 12px; margin-top: 8px; }

        .btn {
            display: inline-block; padding: 14px 32px; border-radius: 8px;
            font-size: 16px; font-weight: 600; text-decoration: none;
            margin-top: 24px;
        }
        .btn-primary { background: #00d4aa; color: #000; }
        .btn-primary:hover { background: #00b894; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="text-decoration: none;"><h1><span>Edge</span>Signals</h1></a>
        <div>
            <a href="/">Dashboard</a>
            <a href="/pricing">Pricing</a>
        </div>
    </div>

    <div class="container">
        <div class="success-icon">&#10003;</div>
        <h2>You're In!</h2>
        <p class="subtitle">Your EdgeSignals {{ plan | capitalize }} subscription is active.</p>

        <div class="detail-box">
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">{{ email }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Plan</span>
                <span class="detail-value">{{ plan | capitalize }}</span>
            </div>
            <div class="detail-row" style="flex-direction: column;">
                <span class="detail-label" style="margin-bottom: 8px;">Your API Key</span>
                <div class="api-key-box">{{ api_key }}</div>
                <p class="api-key-warning">Save this key now. You will need it to access the API.</p>
            </div>
        </div>

        <a href="/" class="btn btn-primary">Go to Dashboard</a>
    </div>
</body>
</html>
